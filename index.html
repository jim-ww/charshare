<!doctype html>
<html lang="ja" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<title>Share</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>

		<script
			src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
			defer
		></script>

		<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>

		<style>
			body {
				font-family: system-ui, sans-serif;
			}
			.work-card {
				transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
			}
			.work-card:hover {
				transform: translateY(-4px);
			}
			.image-container {
				aspect-ratio: 16/11;
			}
		</style>
	</head>
	<body class="bg-base-100 text-base-content min-h-screen">
		<div x-data="app()" class="max-w-7xl mx-auto p-6">
			<!-- NAV -->
			<nav
				class="flex items-center justify-between mb-10 border-b border-base-300 pb-6"
			>
				<div class="flex items-center gap-3">
					<h1 class="text-3xl font-bold tracking-tight">Share</h1>
					<span class="text-xs px-3 py-1 bg-base-300/50 rounded-full"
						>p2p</span
					>
				</div>

				<div class="flex gap-2">
					<button
						@click="navigate('home')"
						:class="{ 'btn btn-primary': currentPage === 'home', 'btn btn-ghost': currentPage !== 'home' }"
					>
						Home
					</button>
					<button
						@click="navigate('publish')"
						:class="{ 'btn btn-primary': currentPage === 'publish', 'btn btn-ghost': currentPage !== 'publish' }"
					>
						Publish
					</button>
					<button
						@click="navigate('browse')"
						:class="{ 'btn btn-primary': currentPage === 'browse', 'btn btn-ghost': currentPage !== 'browse' }"
					>
						Browse
					</button>
				</div>
			</nav>

			<!-- HOME -->
			<template x-if="currentPage === 'home'">
				<div class="text-center py-20">
					<h2 class="text-5xl font-bold mb-4">Own your images.</h2>
					<p class="text-lg text-base-content/70">
						Decentralized • No middleman
					</p>
					<button
						@click="navigate('publish')"
						class="mt-10 btn btn-primary btn-lg"
					>
						Publish a work
					</button>
				</div>
			</template>

			<!-- PUBLISH -->
			<template x-if="currentPage === 'publish'">
				<div class="max-w-xl mx-auto">
					<h2 class="text-3xl font-semibold mb-8">
						Publish New Work
					</h2>

					<div class="space-y-6">
						<div>
							<label class="label"
								><span class="label-text">Title</span></label
							>
							<input
								x-model="newWork.title"
								type="text"
								placeholder="My beautiful artwork"
								class="input input-bordered w-full"
							/>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Tags (comma separated)</span
								></label
							>
							<input
								x-model="newWork.tags"
								type="text"
								placeholder="art, sunset, nature"
								class="input input-bordered w-full"
							/>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Image URL or IPFS CID</span
								></label
							>
							<input
								x-model="newWork.imageRef"
								type="text"
								placeholder="https://... or Qm..."
								class="input input-bordered w-full"
							/>
						</div>

						<button
							@click="publishWork()"
							:disabled="!newWork.title || !newWork.imageRef"
							class="btn btn-primary w-full py-3 text-lg"
						>
							Publish to the Network
						</button>

						<div
							x-show="status"
							:class="status.includes('✓') ? 'alert alert-success' : 'alert alert-info'"
						>
							<span x-text="status"></span>
						</div>
					</div>
				</div>
			</template>

			<!-- BROWSE -->
			<template x-if="currentPage === 'browse'">
				<div class="flex gap-8">
					<!-- SIDEBAR -->
					<div class="w-72 hidden lg:flex flex-col gap-6">
						<h3 class="font-semibold text-lg">Filters</h3>

						<div>
							<input
								x-model="searchTerm"
								type="text"
								placeholder="Search title or tags..."
								class="input input-bordered w-full"
								@input="currentPageNum = 1"
							/>
						</div>

						<div>
							<h4 class="text-sm font-medium mb-2">Date</h4>
							<div class="flex flex-col gap-1">
								<button
									@click="dateFilter = 'all'; currentPageNum = 1"
									:class="{ 'btn btn-neutral': dateFilter === 'all', 'btn btn-ghost': dateFilter !== 'all' }"
								>
									All time
								</button>
								<button
									@click="dateFilter = 'today'; currentPageNum = 1"
									:class="{ 'btn btn-neutral': dateFilter === 'today', 'btn btn-ghost': dateFilter !== 'today' }"
								>
									Today
								</button>
								<button
									@click="dateFilter = 'week'; currentPageNum = 1"
									:class="{ 'btn btn-neutral': dateFilter === 'week', 'btn btn-ghost': dateFilter !== 'week' }"
								>
									Last 7 days
								</button>
							</div>
						</div>
					</div>

					<!-- MAIN CONTENT -->
					<div class="flex-1">
						<div class="flex justify-between items-center mb-6">
							<h2
								class="text-3xl font-semibold"
								x-text="pageTitle"
							></h2>
							<button
								@click="refreshWorks()"
								class="btn btn-sm btn-ghost"
							>
								Refresh
							</button>
						</div>

						<div
							class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
						>
							<template
								x-for="work in paginatedWorks"
								:key="work.id"
							>
								<div
									@click="viewWork(work)"
									class="work-card card bg-base-200 border border-base-300 overflow-hidden cursor-pointer"
								>
									<div
										class="image-container bg-base-300 flex items-center justify-center overflow-hidden"
									>
										<img
											:src="getImageSrc(work)"
											class="max-h-full max-w-full object-contain"
											onerror="
												this.src =
													'https://picsum.photos/id/237/600/400'
											"
										/>
									</div>
									<div class="p-5">
										<h3
											class="font-medium line-clamp-2 mb-3"
											x-text="work.title"
										></h3>
										<div class="flex flex-wrap gap-2">
											<span
												x-for="tag in (work.tags ? work.tags.split(' ') : [])"
												:key="tag"
												class="badge badge-sm badge-neutral"
												x-text="tag"
											></span>
										</div>
										<div
											class="mt-6 text-xs opacity-60 flex justify-between font-mono"
										>
											<span
												x-text="formatTime(work.timestamp)"
											></span>
											<span
												x-text="work.authorPub ? work.authorPub.substring(0,10)+'...' : ''"
											></span>
										</div>
									</div>
								</div>
							</template>
						</div>

						<!-- PAGINATION -->
						<div
							x-show="totalPages > 1"
							class="flex justify-center gap-2 mt-10"
						>
							<button
								@click="prevPage()"
								:disabled="currentPageNum === 1"
								class="btn btn-sm"
							>
								Previous
							</button>
							<span class="px-4 py-2"
								>Page <span x-text="currentPageNum"></span> of
								<span x-text="totalPages"></span
							></span>
							<button
								@click="nextPage()"
								:disabled="currentPageNum === totalPages"
								class="btn btn-sm"
							>
								Next
							</button>
						</div>

						<div
							x-show="filteredWorks.length === 0"
							class="text-center py-20 opacity-50"
						>
							No works match your filter.
						</div>
					</div>
				</div>
			</template>

			<!-- SINGLE WORK VIEW -->
			<template x-if="currentPage === 'view' && selectedWork">
				<div class="max-w-4xl mx-auto">
					<button
						@click="navigate('browse')"
						class="btn btn-ghost mb-6"
					>
						← Back to Browse
					</button>

					<div class="bg-base-200 rounded-3xl overflow-hidden">
						<div class="flex justify-center bg-base-300 p-8">
							<img
								:src="getImageSrc(selectedWork)"
								class="max-h-[70vh] max-w-full object-contain rounded-2xl"
								onerror="
									this.src =
										'https://picsum.photos/id/237/1200/800'
								"
							/>
						</div>

						<div class="p-8">
							<h1
								class="text-4xl font-semibold mb-4"
								x-text="selectedWork.title"
							></h1>

							<div class="flex flex-wrap gap-2 mb-8">
								<span
									x-for="tag in (selectedWork.tags ? selectedWork.tags.split(' ') : [])"
									:key="tag"
									class="badge badge-lg badge-neutral"
									x-text="tag"
								></span>
							</div>

							<div
								class="flex justify-between text-sm opacity-70 font-mono"
							>
								<span
									x-text="formatTime(selectedWork.timestamp)"
								></span>
								<span
									x-text="selectedWork.authorPub ? selectedWork.authorPub.substring(0,12)+'...' : ''"
								></span>
							</div>
						</div>
					</div>
				</div>
			</template>
		</div>

		<script>
			function app() {
				return {
					currentPage: "home",
					gun: null,
					works: [],
					status: "",
					searchTerm: "",
					dateFilter: "all",
					currentPageNum: 1,
					selectedWork: null,

					newWork: { title: "", tags: "", imageRef: "" },

					APP_ID: "share-platform-v1",

					init() {
						this.gun = Gun({
							peers: [
								"https://gun-mesh.austinhenderson.com/gun",
								"https://relay.peer.ooo/gun",
							],
							localStorage: true,
							radisk: true,
						});
						this.loadWorks();
					},

					// ───── VALIDATION & SANITIZATION ─────
					validateAndSanitizeWork(data) {
						if (!data || typeof data !== "object") return null;
						if (
							!data.title ||
							typeof data.title !== "string" ||
							data.title.trim() === ""
						)
							return null;
						if (!data.imageRef || typeof data.imageRef !== "string")
							return null;

						const sanitized = {
							title: data.title.trim().replace(/[<>"'&]/g, ""),
							tags:
								typeof data.tags === "string"
									? data.tags.trim().replace(/[<>"'&]/g, "")
									: "",
							imageRef: data.imageRef.trim(),
							authorPub: data.authorPub || "",
							timestamp:
								typeof data.timestamp === "number"
									? data.timestamp
									: Date.now(),
							id: data.id || "",
						};
						return sanitized;
					},

					getImageSrc(work) {
						if (!work?.imageRef) return "";
						return work.imageRef.startsWith("Qm") ||
							work.imageRef.startsWith("bafy")
							? `https://ipfs.io/ipfs/${work.imageRef}`
							: work.imageRef;
					},

					formatTime(ts) {
						return ts
							? new Date(ts).toLocaleString("ja-JP", {
									month: "short",
									day: "numeric",
									hour: "2-digit",
									minute: "2-digit",
								})
							: "";
					},

					// ───── PUBLISH ─────
					async publishWork() {
						if (!this.newWork.title || !this.newWork.imageRef)
							return;

						const sanitized = this.validateAndSanitizeWork({
							title: this.newWork.title,
							tags: this.newWork.tags,
							imageRef: this.newWork.imageRef,
						});

						if (!sanitized) {
							this.status = "Invalid input";
							return;
						}

						try {
							const pair = await SEA.pair();
							const metadata = {
								...sanitized,
								authorPub: pair.pub,
								timestamp: Date.now(),
							};
							const signature = await SEA.sign(metadata, pair);
							const workId = "work-" + Date.now();

							this.gun
								.get(this.APP_ID)
								.get("works")
								.get(workId)
								.put({
									...metadata,
									signature,
									id: workId,
								});

							this.status = "✓ Published successfully!";
							this.newWork = {
								title: "",
								tags: "",
								imageRef: "",
							};

							setTimeout(() => {
								this.status = "";
								if (this.currentPage === "browse")
									this.refreshWorks();
							}, 2500);
						} catch (e) {
							this.status = "Error: " + e.message;
						}
					},

					// ───── LOADING & FILTERING ─────
					loadWorks() {
						this.works = [];
						this.gun
							.get(this.APP_ID)
							.get("works")
							.map()
							.on((rawData) => {
								const data =
									this.validateAndSanitizeWork(rawData);
								if (!data || !data.title) return;
								if (!this.works.some((w) => w.id === data.id)) {
									this.works.unshift(data);
									if (this.works.length > 60)
										this.works.pop();
								}
							});
					},

					refreshWorks() {
						this.works = [];
						this.loadWorks();
					},

					get filteredWorks() {
						let filtered = this.works;

						// Search
						if (this.searchTerm) {
							const term = this.searchTerm.toLowerCase();
							filtered = filtered.filter(
								(w) =>
									(w.title &&
										w.title.toLowerCase().includes(term)) ||
									(w.tags &&
										w.tags.toLowerCase().includes(term)),
							);
						}

						// Date filter
						const now = Date.now();
						if (this.dateFilter === "today") {
							filtered = filtered.filter(
								(w) => now - w.timestamp < 86400000,
							);
						} else if (this.dateFilter === "week") {
							filtered = filtered.filter(
								(w) => now - w.timestamp < 604800000,
							);
						}

						return filtered;
					},

					get paginatedWorks() {
						const start = (this.currentPageNum - 1) * 12;
						return this.filteredWorks.slice(start, start + 12);
					},

					get totalPages() {
						return Math.max(
							1,
							Math.ceil(this.filteredWorks.length / 12),
						);
					},

					nextPage() {
						if (this.currentPageNum < this.totalPages)
							this.currentPageNum++;
					},
					prevPage() {
						if (this.currentPageNum > 1) this.currentPageNum--;
					},

					get pageTitle() {
						if (this.searchTerm)
							return `Search results for "${this.searchTerm}"`;
						return "Latest Works";
					},

					// ───── NAVIGATION & SINGLE VIEW ─────
					navigate(page) {
						this.currentPage = page;
						if (page === "browse") this.currentPageNum = 1;
					},

					viewWork(work) {
						this.selectedWork = work;
						this.currentPage = "view";
					},
				};
			}
		</script>
	</body>
</html>
