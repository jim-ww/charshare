<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<title>CharShare</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>

		<script
			src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
			defer
		></script>

		<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>

		<style>
			body {
				font-family: system-ui, sans-serif;
			}
			.char-card {
				transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
			}
			.char-card:hover {
				transform: translateY(-6px);
			}
			.message {
				transition: background-color 0.2s;
			}
			.message:hover .message-controls {
				opacity: 1;
			}
		</style>
	</head>
	<body class="bg-base-100 text-base-content min-h-screen">
		<div x-data="app()" class="max-w-7xl mx-auto p-6">
			<!-- HEADER -->
			<header
				class="flex items-center justify-between mb-10 border-b border-base-300 pb-6"
			>
				<a
					href="#home"
					@click="navigate('home')"
					class="text-3xl font-bold tracking-tight cursor-pointer hover:text-primary"
					>CharShare</a
				>

				<div class="flex items-center gap-4">
					<button
						onclick="prefs_modal.showModal()"
						class="btn btn-ghost btn-sm"
					>
						Preferences
					</button>
					<button
						@click="navigate('publish')"
						class="btn btn-primary"
					>
						Share Character
					</button>
					<button @click="navigate('browse')" class="btn btn-ghost">
						Browse
					</button>
				</div>
			</header>

			<!-- HOME -->
			<template x-if="currentPage === 'home'">
				<div class="text-center py-24">
					<h1 class="text-6xl font-bold mb-6">
						Free. Uncensored.<br />Decentralized AI Characters.
					</h1>
					<p class="text-xl text-base-content/70">
						Share and chat with AI characters with no accounts and
						no restrictions.
					</p>
					<div class="mt-12">
						<button
							@click="navigate('publish')"
							class="btn btn-primary btn-lg px-10"
						>
							Share a Character
						</button>
					</div>
				</div>
			</template>

			<!-- PUBLISH -->
			<template x-if="currentPage === 'publish'">
				<div class="max-w-2xl mx-auto">
					<h2 class="text-3xl font-semibold mb-8">
						Share New Character
					</h2>

					<div class="space-y-8">
						<div>
							<label class="label"
								><span class="label-text"
									>Character Image (optional)</span
								></label
							>
							<input
								type="file"
								accept="image/*"
								@change="handleFileSelect($event)"
								class="file-input file-input-bordered w-full"
							/>
							<div x-show="previewUrl" class="mt-4">
								<img
									:src="previewUrl"
									class="max-h-80 mx-auto rounded-2xl border border-base-300"
								/>
							</div>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Character Name
									<span class="text-red-500">*</span></span
								></label
							>
							<input
								x-model="newChar.name"
								maxlength="100"
								type="text"
								placeholder="Akeno Himejima"
								class="input input-bordered w-full"
							/>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Description (optional)</span
								></label
							>
							<textarea
								x-model="newChar.description"
								rows="3"
								placeholder="A teasing and powerful devil..."
								class="textarea textarea-bordered w-full"
							></textarea>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>System Prompt</span
								></label
							>
							<textarea
								x-model="newChar.systemPrompt"
								rows="4"
								placeholder="You are Akeno Himejima..."
								class="textarea textarea-bordered w-full"
							></textarea>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>First Message
									<span class="text-red-500">*</span></span
								></label
							>
							<input
								x-model="newChar.firstMessage"
								type="text"
								placeholder="Ara ara~ Hello there..."
								class="input input-bordered w-full"
							/>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Tags
									<span class="text-red-500">*</span></span
								></label
							>
							<input
								x-model="newChar.tags"
								type="text"
								placeholder="anime, devil, teasing"
								class="input input-bordered w-full"
							/>
						</div>

						<div class="grid grid-cols-2 gap-4">
							<div>
								<label class="label"
									><span class="label-text"
										>Author (optional)</span
									></label
								>
								<input
									x-model="newChar.author"
									type="text"
									placeholder="Your name"
									class="input input-bordered w-full"
								/>
							</div>
							<div>
								<label class="label"
									><span class="label-text"
										>Author URL (optional)</span
									></label
								>
								<input
									x-model="newChar.authorUrl"
									type="text"
									placeholder="https://..."
									class="input input-bordered w-full"
								/>
							</div>
						</div>

						<button
							@click="publishCharacter()"
							:disabled="!newChar.name || !newChar.tags || !newChar.firstMessage"
							class="btn btn-primary w-full py-4 text-lg"
						>
							Publish Character Card
						</button>

						<div
							x-show="status"
							class="alert"
							:class="status.includes('✓') ? 'alert-success' : 'alert-error'"
						>
							<span x-text="status"></span>
						</div>
					</div>
				</div>
			</template>

			<!-- BROWSE -->
			<template x-if="currentPage === 'browse'">
				<div>
					<div class="mb-8">
						<div class="relative max-w-3xl mx-auto">
							<input
								x-model="searchTerm"
								@keyup.enter="performSearch()"
								type="text"
								placeholder="Search characters..."
								class="input input-bordered w-full text-lg py-7 pl-6 pr-24"
							/>
							<button
								@click="performSearch()"
								class="absolute right-3 top-1/2 -translate-y-1/2 btn btn-primary"
							>
								Search
							</button>
						</div>
					</div>

					<div class="flex justify-end mb-4">
						<div class="tabs tabs-boxed">
							<button
								@click="viewMode = 'public'"
								:class="{ 'tab tab-active': viewMode === 'public' }"
							>
								Public
							</button>
							<button
								@click="viewMode = 'local'"
								:class="{ 'tab tab-active': viewMode === 'local' }"
							>
								My Local Characters
							</button>
						</div>
					</div>

					<div
						class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
					>
						<template
							x-for="char in filteredCharacters"
							:key="char.id"
						>
							<div
								@click="viewCharacter(char)"
								class="char-card card bg-base-200 border border-base-300 overflow-hidden cursor-pointer"
							>
								<figure class="h-64 bg-base-300">
									<img
										:src="char.imageRef"
										class="w-full h-full object-cover"
									/>
								</figure>
								<div class="p-5">
									<h3
										class="font-semibold text-lg mb-1 line-clamp-1"
										x-text="char.name"
									></h3>
									<p
										class="text-sm opacity-70 line-clamp-2 mb-4"
										x-text="char.description || 'No description'"
									></p>
									<div class="flex flex-wrap gap-1.5">
										<template
											x-for="tag in getTagsArray(char)"
											:key="tag"
										>
											<span
												class="badge badge-sm badge-neutral text-xs"
												x-text="tag"
											></span>
										</template>
									</div>
								</div>
							</div>
						</template>
					</div>
				</div>
			</template>

			<!-- CHARACTER VIEW -->
			<template x-if="currentPage === 'view' && selectedCharacter">
				<div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
					<div class="lg:col-span-5">
						<div class="bg-base-200 rounded-3xl overflow-hidden">
							<img
								:src="selectedCharacter.imageRef"
								class="w-full h-auto"
							/>
						</div>

						<div class="mt-6">
							<h1
								class="text-4xl font-bold"
								x-text="selectedCharacter.name"
							></h1>
							<p
								class="mt-3 text-base-content/80"
								x-text="selectedCharacter.description || 'No description provided.'"
							></p>
						</div>

						<div class="mt-8 flex flex-wrap gap-2">
							<template
								x-for="tag in getTagsArray(selectedCharacter)"
								:key="tag"
							>
								<span
									class="badge badge-lg badge-neutral"
									x-text="tag"
								></span>
							</template>
						</div>

						<div class="mt-10 space-y-3">
							<button
								@click="startNewChat()"
								class="btn btn-primary btn-lg w-full"
							>
								Start New Chat
							</button>
							<button
								@click="continueLatestChat()"
								class="btn btn-outline btn-lg w-full"
							>
								Continue Latest Chat
							</button>
						</div>
					</div>

					<div class="lg:col-span-7">
						<h3 class="text-xl font-semibold mb-4">
							Character Info
						</h3>
						<div
							class="bg-base-200 p-6 rounded-3xl text-sm whitespace-pre-wrap"
							x-text="selectedCharacter.systemPrompt || 'No system prompt'"
						></div>
					</div>
				</div>
			</template>

			<!-- CHAT PAGE -->
			<template x-if="currentPage === 'chat' && currentChat">
				<div class="flex flex-col h-screen -mt-6 bg-base-900">
					<!-- Chat Header -->
					<div
						class="bg-base-200 border-b border-base-300 p-4 flex items-center gap-4"
					>
						<button
							@click="exitChat()"
							class="btn btn-ghost btn-sm"
						>
							← Back
						</button>
						<img
							:src="currentChat.character.imageRef"
							class="w-10 h-10 rounded-full object-cover border border-base-300"
						/>
						<div class="flex-1">
							<div
								class="font-semibold"
								x-text="currentChat.character.name"
							></div>
							<div class="text-xs opacity-60">AI Character</div>
						</div>
						<button
							onclick="prefs_modal.showModal()"
							class="btn btn-ghost btn-sm"
						>
							Settings
						</button>
					</div>

					<!-- Messages Area -->
					<div
						id="chat-messages"
						class="flex-1 overflow-y-auto p-6 space-y-8 bg-base-950"
					>
						<template
							x-for="msg in currentChat.messages"
							:key="msg.id"
						>
							<div
								:class="msg.isUser ? 'flex justify-end' : 'flex justify-start'"
								class="message group"
							>
								<div class="flex gap-3 max-w-[70%]">
									<div
										x-show="!msg.isUser"
										class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 mt-1"
									>
										<img
											:src="currentChat.character.imageRef"
											class="w-full h-full object-cover"
										/>
									</div>
									<div
										:class="msg.isUser ? 'chat-bubble-user' : 'chat-bubble-bot'"
										class="px-5 py-3 rounded-3xl relative"
									>
										<span x-text="msg.text"></span>
										<div
											class="message-controls opacity-0 group-hover:opacity-100 absolute -bottom-6 right-0 flex gap-1 text-xs"
										>
											<button
												@click="regenerateMessage(msg)"
												class="btn btn-xs btn-ghost"
											>
												Regenerate
											</button>
											<button
												@click="deleteMessage(msg)"
												class="btn btn-xs btn-ghost text-red-400"
											>
												Delete
											</button>
											<button
												@click="editMessage(msg)"
												class="btn btn-xs btn-ghost"
											>
												Edit
											</button>
										</div>
									</div>
								</div>
							</div>
						</template>
					</div>

					<!-- Input Dock -->
					<div class="p-4 border-t border-base-300 bg-base-200">
						<div class="flex gap-3 max-w-4xl mx-auto">
							<input
								x-model="chatInput"
								@keyup.enter="sendMessage()"
								type="text"
								placeholder="Type your message..."
								class="input input-bordered flex-1 py-6 text-lg"
							/>
							<button
								@click="sendMessage()"
								class="btn btn-primary px-10"
							>
								Send
							</button>
						</div>
					</div>
				</div>
			</template>
		</div>

		<!-- Preferences Modal -->
		<dialog id="prefs_modal" class="modal">
			<div class="modal-box">
				<h3 class="font-bold text-xl mb-6">Preferences</h3>
				<div class="space-y-6">
					<div>
						<label class="label"
							><span class="label-text"
								>OpenRouter API Key</span
							></label
						>
						<input
							x-model="settings.openRouterKey"
							type="password"
							placeholder="sk-or-..."
							class="input input-bordered w-full"
						/>
						<p class="text-xs opacity-60 mt-1">
							Saved locally only. Used for AI responses.
						</p>
					</div>
				</div>
				<div class="modal-action">
					<button onclick="prefs_modal.close()" class="btn">
						Close
					</button>
					<button @click="saveSettings()" class="btn btn-primary">
						Save Settings
					</button>
				</div>
			</div>
		</dialog>

		<script>
			function app() {
				return {
					currentPage: "home",
					gun: null,
					characters: [], // public characters from Gun
					localCharacters: [], // local-only characters
					status: "",
					searchTerm: "",
					currentPageNum: 1,
					selectedCharacter: null,
					previewUrl: null,
					viewMode: "public",

					newChar: {
						name: "",
						description: "",
						systemPrompt:
							"You are an immersive AI character. Respond in character. Use * for actions.",
						firstMessage: "Hello! It's nice to meet you.",
						tags: "",
						author: "",
						authorUrl: "",
						imageRef: "",
						isLocal: false,
					},

					currentChat: null,
					chatInput: "",

					settings: {
						openRouterKey: "",
					},

					APP_ID: "charshare-v3",

					init() {
						this.gun = Gun({
							peers: [
								"https://gun-mesh.austinhenderson.com/gun",
								"https://relay.peer.ooo/gun",
							],
							localStorage: true,
						});
						this.loadCharacters();
						this.loadLocalCharacters();
						this.loadSettings();
						this.handleHashRouting();
					},

					handleFileSelect(e) {
						const file = e.target.files[0];
						if (!file) return;
						const reader = new FileReader();
						reader.onload = (ev) => {
							this.previewUrl = ev.target.result;
							this.newChar.imageRef = ev.target.result;
						};
						reader.readAsDataURL(file);
					},

					async publishCharacter() {
						if (
							!this.newChar.name ||
							!this.newChar.tags ||
							!this.newChar.firstMessage
						) {
							this.status =
								"Name, tags and first message are required";
							return;
						}

						if (this.newChar.isLocal) {
							const localChar = {
								...this.newChar,
								id: "local-" + Date.now(),
								timestamp: Date.now(),
							};
							this.localCharacters.unshift(localChar);
							this.saveLocalCharacters();
							this.status = "✓ Saved locally only";
							this.navigate("browse");
							return;
						}

						try {
							const pair = await SEA.pair();
							const charId = "char-" + Date.now();

							const data = {
								id: charId,
								name: this.newChar.name.trim(),
								description: this.newChar.description.trim(),
								systemPrompt: this.newChar.systemPrompt.trim(),
								firstMessage: this.newChar.firstMessage.trim(),
								tags: this.newChar.tags.trim(),
								author: this.newChar.author.trim(),
								authorUrl: this.newChar.authorUrl.trim(),
								imageRef: this.newChar.imageRef,
								timestamp: Date.now(),
								authorPub: pair.pub,
							};

							const signature = await SEA.sign(data, pair);

							this.gun
								.get(this.APP_ID)
								.get("characters")
								.get(charId)
								.put({
									...data,
									signature,
								});

							this.status = "✓ Published to the network!";
							this.navigate("browse");
						} catch (e) {
							this.status = "Error: " + e.message;
						}
					},

					loadCharacters() {
						this.characters = [];
						this.gun
							.get(this.APP_ID)
							.get("characters")
							.map()
							.on((data) => {
								if (data && data.name)
									this.characters.unshift(data);
							});
					},

					loadLocalCharacters() {
						const saved = localStorage.getItem("localCharacters");
						if (saved) this.localCharacters = JSON.parse(saved);
					},

					saveLocalCharacters() {
						localStorage.setItem(
							"localCharacters",
							JSON.stringify(this.localCharacters),
						);
					},

					loadSettings() {
						const saved =
							localStorage.getItem("charshare_settings");
						if (saved) this.settings = JSON.parse(saved);
					},

					saveSettings() {
						localStorage.setItem(
							"charshare_settings",
							JSON.stringify(this.settings),
						);
						prefs_modal.close();
					},

					startNewChat() {
						if (!this.selectedCharacter) return;
						this.currentChat = {
							character: this.selectedCharacter,
							messages: [
								{
									id: Date.now(),
									isUser: false,
									text: this.selectedCharacter.firstMessage,
								},
							],
						};
						this.currentPage = "chat";
					},

					continueLatestChat() {
						alert("Continue latest chat - coming soon");
					},

					sendMessage() {
						if (!this.chatInput.trim() || !this.currentChat) return;

						this.currentChat.messages.push({
							id: Date.now(),
							isUser: true,
							text: this.chatInput.trim(),
						});

						const userMsg = this.chatInput;
						this.chatInput = "";

						// Simulate AI response (replace with OpenRouter later)
						setTimeout(() => {
							this.currentChat.messages.push({
								id: Date.now(),
								isUser: false,
								text: "I'm here. What would you like to do?",
							});
							this.$nextTick(() => {
								const msgContainer =
									document.getElementById("chat-messages");
								if (msgContainer)
									msgContainer.scrollTop =
										msgContainer.scrollHeight;
							});
						}, 800);
					},

					// Navigation & Routing
					navigate(page) {
						this.currentPage = page;
						window.location.hash = "#" + page;
					},

					viewCharacter(char) {
						this.selectedCharacter = char;
						this.currentPage = "view";
						window.location.hash = `#view:${char.id}`;
					},

					exitChat() {
						this.currentPage = "view";
					},

					performSearch() {
						window.location.hash = `#browse?q=${encodeURIComponent(this.searchTerm)}`;
					},

					searchByTag(tag) {
						this.searchTerm = tag;
						this.performSearch();
					},

					handleHashRouting() {
						const hash = window.location.hash || "#home";
						if (hash.startsWith("#view:")) {
							const id = hash.slice(6);
							const char = [
								...this.characters,
								...this.localCharacters,
							].find((c) => c.id === id);
							if (char) {
								this.selectedCharacter = char;
								this.currentPage = "view";
							}
						} else if (hash.startsWith("#browse?q=")) {
							this.searchTerm = decodeURIComponent(
								hash.slice(10),
							);
							this.currentPage = "browse";
						} else if (
							hash === "#browse" ||
							hash === "#publish" ||
							hash === "#home"
						) {
							this.currentPage = hash.slice(1);
						} else {
							this.currentPage = "home";
						}
					},

					get filteredCharacters() {
						const list =
							this.viewMode === "public"
								? this.characters
								: this.localCharacters;
						if (!this.searchTerm) return list;
						const term = this.searchTerm.toLowerCase();
						return list.filter(
							(c) =>
								c.name.toLowerCase().includes(term) ||
								(c.tags && c.tags.toLowerCase().includes(term)),
						);
					},

					get paginatedCharacters() {
						const start = (this.currentPageNum - 1) * 12;
						return this.filteredCharacters.slice(start, start + 12);
					},

					getTagsArray(char) {
						return char?.tags
							? char.tags
									.split(",")
									.map((t) => t.trim())
									.filter(Boolean)
							: [];
					},
				};
			}
		</script>
	</body>
</html>
