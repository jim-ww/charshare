<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<title>CharShare - Decentralized AI Characters</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>

		<script
			src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
			defer
		></script>

		<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>

		<style>
			body {
				font-family: system-ui, sans-serif;
			}
			.card-hover {
				transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
			}
			.card-hover:hover {
				transform: translateY(-4px);
			}
		</style>
	</head>
	<body class="bg-base-100 text-base-content min-h-screen">
		<div x-data="app()" class="max-w-7xl mx-auto p-6">
			<!-- HEADER -->
			<header
				class="flex items-center justify-between mb-10 border-b border-base-300 pb-6"
			>
				<a
					href="#home"
					@click="navigate('home')"
					class="text-3xl font-bold tracking-tight cursor-pointer hover:text-primary"
					>CharShare</a
				>
				<span class="text-sm opacity-60"
					>Decentralized • Uncensored • No accounts</span
				>

				<div class="flex items-center gap-4">
					<button
						@click="navigate('publish')"
						class="btn btn-primary"
					>
						Share Character
					</button>
					<button @click="navigate('browse')" class="btn btn-ghost">
						Browse Characters
					</button>
				</div>
			</header>

			<!-- HOME -->
			<template x-if="currentPage === 'home'">
				<div class="text-center py-20">
					<h2 class="text-5xl font-bold mb-4">
						Share AI Characters Freely
					</h2>
					<p class="text-xl text-base-content/70 max-w-2xl mx-auto">
						A decentralized, uncensored platform for AI character
						cards.<br />
						No accounts. No moderation. Everything stored on the P2P
						network.
					</p>
					<div class="mt-10">
						<button
							@click="navigate('publish')"
							class="btn btn-primary btn-lg"
						>
							Share a new character
						</button>
					</div>
				</div>
			</template>

			<!-- PUBLISH PAGE -->
			<template x-if="currentPage === 'publish'">
				<div class="max-w-2xl mx-auto">
					<h2 class="text-3xl font-semibold mb-8">
						Share New AI Character
					</h2>

					<div class="space-y-8">
						<!-- Image -->
						<div>
							<label class="label"
								><span class="label-text"
									>Character Image
									<span class="text-red-500">*</span></span
								></label
							>
							<input
								type="file"
								accept="image/*"
								@change="handleFileSelect($event)"
								class="file-input file-input-bordered w-full"
							/>
							<div x-show="previewUrl" class="mt-4">
								<img
									:src="previewUrl"
									class="max-h-80 mx-auto rounded-2xl border border-base-300"
								/>
							</div>
						</div>

						<!-- Name -->
						<div>
							<label class="label"
								><span class="label-text"
									>Character Name
									<span class="text-red-500">*</span></span
								></label
							>
							<input
								x-model="newCharacter.name"
								maxlength="80"
								type="text"
								placeholder="Akeno Himejima"
								class="input input-bordered w-full"
							/>
						</div>

						<!-- Description -->
						<div>
							<label class="label"
								><span class="label-text"
									>Description (optional)</span
								></label
							>
							<textarea
								x-model="newCharacter.description"
								rows="3"
								placeholder="A powerful and elegant devil from the Occult Research Club..."
								class="textarea textarea-bordered w-full"
							></textarea>
						</div>

						<!-- System Prompt -->
						<div>
							<label class="label"
								><span class="label-text"
									>System Prompt (Initial Prompt)</span
								></label
							>
							<textarea
								x-model="newCharacter.systemPrompt"
								rows="5"
								placeholder="You are Akeno Himejima... Speak in a calm, teasing tone. Use * for actions."
								class="textarea textarea-bordered w-full"
							></textarea>
						</div>

						<!-- First Message -->
						<div>
							<label class="label"
								><span class="label-text"
									>First Message
									<span class="text-red-500">*</span></span
								></label
							>
							<input
								x-model="newCharacter.firstMessage"
								type="text"
								placeholder="Ara ara~ Hello there. What brings you to me today?"
								class="input input-bordered w-full"
							/>
						</div>

						<!-- Tags -->
						<div>
							<label class="label"
								><span class="label-text"
									>Tags
									<span class="text-red-500">*</span> (comma
									separated)</span
								></label
							>
							<input
								x-model="newCharacter.tags"
								type="text"
								placeholder="anime, devil, teasing, big breasts"
								class="input input-bordered w-full"
							/>
						</div>

						<!-- Author -->
						<div class="grid grid-cols-2 gap-4">
							<div>
								<label class="label"
									><span class="label-text"
										>Author Name (optional)</span
									></label
								>
								<input
									x-model="newCharacter.author"
									type="text"
									placeholder="Your name"
									class="input input-bordered w-full"
								/>
							</div>
							<div>
								<label class="label"
									><span class="label-text"
										>Author URL (optional)</span
									></label
								>
								<input
									x-model="newCharacter.authorUrl"
									type="text"
									placeholder="https://..."
									class="input input-bordered w-full"
								/>
							</div>
						</div>

						<button
							@click="publishCharacter()"
							:disabled="!newCharacter.name || !newCharacter.tags || !newCharacter.firstMessage || !newCharacter.imageRef"
							class="btn btn-primary w-full py-3 text-lg"
						>
							Publish Character Card
						</button>

						<div
							x-show="status"
							class="alert"
							:class="status.includes('✓') ? 'alert-success' : 'alert-error'"
						>
							<span x-text="status"></span>
						</div>
					</div>
				</div>
			</template>

			<!-- BROWSE -->
			<template x-if="currentPage === 'browse'">
				<div>
					<div class="mb-8">
						<div class="relative max-w-2xl mx-auto">
							<input
								x-model="searchTerm"
								@keyup.enter="performSearch()"
								type="text"
								placeholder="Search characters..."
								class="input input-bordered w-full text-lg py-6 pl-5 pr-20"
							/>
							<button
								@click="performSearch()"
								class="absolute right-2 top-1/2 -translate-y-1/2 btn btn-primary btn-sm px-6"
							>
								Search
							</button>
						</div>
					</div>

					<div
						class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
					>
						<template
							x-for="char in paginatedCharacters"
							:key="char.id"
						>
							<div
								@click="viewCharacter(char)"
								class="card-hover card bg-base-200 border border-base-300 overflow-hidden cursor-pointer"
							>
								<figure class="image-container bg-base-300">
									<img
										:src="char.imageRef"
										class="w-full h-full object-cover"
									/>
								</figure>
								<div class="p-5">
									<h3
										class="font-semibold text-lg mb-1"
										x-text="char.name"
									></h3>
									<p
										class="text-sm opacity-70 line-clamp-2 mb-4"
										x-text="char.description || 'No description'"
									></p>
									<div class="flex flex-wrap gap-2">
										<template
											x-for="tag in getTagsArray(char)"
											:key="tag"
										>
											<span
												class="badge badge-sm badge-neutral"
												x-text="tag"
											></span>
										</template>
									</div>
								</div>
							</div>
						</template>
					</div>
				</div>
			</template>

			<!-- CHARACTER VIEW -->
			<template x-if="currentPage === 'view' && selectedCharacter">
				<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
					<!-- Left: Character Info -->
					<div class="lg:col-span-5">
						<img
							:src="selectedCharacter.imageRef"
							class="w-full rounded-3xl shadow-2xl"
							alt="character image"
						/>

						<div class="mt-6">
							<h1
								class="text-4xl font-bold"
								x-text="selectedCharacter.name"
							></h1>
							<p
								class="text-base-content/70 mt-2"
								x-text="selectedCharacter.description || 'No description provided'"
							></p>
						</div>

						<div class="mt-8 flex flex-wrap gap-2">
							<template
								x-for="tag in getTagsArray(selectedCharacter)"
								:key="tag"
							>
								<span
									class="badge badge-lg badge-neutral"
									x-text="tag"
								></span>
							</template>
						</div>

						<div class="mt-10 grid grid-cols-2 gap-4 text-sm">
							<div>
								<div class="opacity-60">Author</div>
								<span
									x-text="selectedCharacter.author || 'Anonymous'"
								></span>
							</div>
							<div>
								<div class="opacity-60">Created</div>
								<span
									x-text="formatTime(selectedCharacter.timestamp)"
								></span>
							</div>
						</div>

						<div class="mt-8">
							<button
								@click="startNewChat()"
								class="btn btn-primary btn-lg w-full"
							>
								Start New Chat
							</button>
						</div>
					</div>

					<!-- Right: Comments + Chats -->
					<div class="lg:col-span-7">
						<h3 class="text-xl font-semibold mb-4">Comments</h3>
						<div class="text-base-content/60">
							Comments coming soon (will be stored under
							app/characters/{id}/comments)
						</div>

						<div class="mt-12">
							<h3 class="text-xl font-semibold mb-4">
								Your Chats with this character
							</h3>
							<button
								@click="showMyChats = true"
								class="btn btn-outline"
							>
								View my chats with this character
							</button>
						</div>
					</div>
				</div>
			</template>
		</div>

		<script>
			function app() {
				return {
					currentPage: "home",
					gun: null,
					characters: [],
					status: "",
					searchTerm: "",
					currentPageNum: 1,
					selectedCharacter: null,
					previewUrl: null,

					newCharacter: {
						name: "",
						description: "",
						systemPrompt:
							"You are a helpful and immersive AI character. Use * for actions like *smiles gently*.",
						firstMessage: "Hello! Nice to meet you.",
						tags: "",
						author: "",
						authorUrl: "",
						imageRef: "",
					},

					APP_ID: "charshare-v1",

					init() {
						this.gun = Gun({
							peers: [
								"https://gun-mesh.austinhenderson.com/gun",
								"https://relay.peer.ooo/gun",
							],
							localStorage: true,
						});
						this.loadCharacters();
						this.handleHashRouting();
					},

					handleFileSelect(e) {
						const file = e.target.files[0];
						if (!file) return;

						const reader = new FileReader();
						reader.onload = (ev) => {
							this.previewUrl = ev.target.result;
							this.newCharacter.imageRef = ev.target.result;
						};
						reader.readAsDataURL(file);
					},

					async publishCharacter() {
						if (
							!this.newCharacter.name ||
							!this.newCharacter.tags ||
							!this.newCharacter.firstMessage ||
							!this.newCharacter.imageRef
						) {
							this.status =
								"Name, tags, first message and image are required";
							return;
						}

						try {
							const pair = await SEA.pair();
							const charId = "char-" + Date.now();

							const characterData = {
								id: charId,
								name: this.newCharacter.name.trim(),
								description:
									this.newCharacter.description.trim(),
								systemPrompt:
									this.newCharacter.systemPrompt.trim(),
								firstMessage:
									this.newCharacter.firstMessage.trim(),
								tags: this.newCharacter.tags.trim(),
								author: this.newCharacter.author.trim(),
								authorUrl: this.newCharacter.authorUrl.trim(),
								imageRef: this.newCharacter.imageRef,
								timestamp: Date.now(),
								authorPub: pair.pub,
							};

							const signature = await SEA.sign(
								characterData,
								pair,
							);

							this.gun
								.get(this.APP_ID)
								.get("characters")
								.get(charId)
								.put({
									...characterData,
									signature,
								});

							this.status = "✓ Character published successfully!";

							setTimeout(() => {
								this.viewCharacter(characterData);
								this.resetNewCharacter();
							}, 1000);
						} catch (e) {
							this.status = "Error publishing: " + e.message;
						}
					},

					resetNewCharacter() {
						this.newCharacter = {
							name: "",
							description: "",
							systemPrompt:
								"You are a helpful and immersive AI character. Use * for actions.",
							firstMessage: "Hello! Nice to meet you.",
							tags: "",
							author: "",
							authorUrl: "",
							imageRef: "",
						};
						this.previewUrl = null;
					},

					loadCharacters() {
						this.characters = [];
						this.gun
							.get(this.APP_ID)
							.get("characters")
							.map()
							.on((data) => {
								if (data && data.name && data.imageRef) {
									if (
										!this.characters.some(
											(c) => c.id === data.id,
										)
									) {
										this.characters.unshift(data);
									}
								}
							});
					},

					getTagsArray(char) {
						return char?.tags
							? char.tags
									.split(",")
									.map((t) => t.trim())
									.filter(Boolean)
							: [];
					},

					// Navigation & Routing
					navigate(page) {
						this.currentPage = page;
						window.location.hash = "#" + page;
					},

					viewCharacter(char) {
						this.selectedCharacter = char;
						this.currentPage = "view";
						window.location.hash = `#view:${char.id}`;
					},

					// Placeholder functions
					startNewChat() {
						alert(
							"Chat feature coming next. This will open the full chat screen.",
						);
					},

					performSearch() {
						window.location.hash = `#browse?q=${encodeURIComponent(this.searchTerm)}`;
					},

					searchByTag(tag) {
						this.searchTerm = tag;
						this.performSearch();
					},

					handleHashRouting() {
						const hash = window.location.hash || "#home";
						if (hash.startsWith("#view:")) {
							const id = hash.slice(6);
							const char = this.characters.find(
								(c) => c.id === id,
							);
							if (char) {
								this.selectedCharacter = char;
								this.currentPage = "view";
							}
						} else if (hash.startsWith("#browse?q=")) {
							this.searchTerm = decodeURIComponent(
								hash.slice(10),
							);
							this.currentPage = "browse";
						} else if (
							hash === "#browse" ||
							hash === "#publish" ||
							hash === "#home"
						) {
							this.currentPage = hash.slice(1);
						} else {
							this.currentPage = "home";
						}
					},
				};
			}
		</script>
	</body>
</html>
