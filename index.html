<!doctype html>
<html lang="ja" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<title>Share</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>

		<script
			src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
			defer
		></script>

		<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>

		<style>
			body {
				font-family: system-ui, sans-serif;
			}
			.work-card {
				transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
			}
			.work-card:hover {
				transform: translateY(-4px);
			}
			.image-container {
				aspect-ratio: 16/10;
			}
		</style>
	</head>
	<body class="bg-base-100 text-base-content min-h-screen">
		<div x-data="app()" class="max-w-7xl mx-auto p-6">
			<!-- HEADER -->
			<header
				class="flex items-center justify-between mb-10 border-b border-base-300 pb-6"
			>
				<a
					href="#home"
					@click="navigate('home')"
					class="text-3xl font-bold tracking-tight cursor-pointer hover:text-primary"
					>Share</a
				>

				<div class="flex items-center gap-4">
					<button
						@click="navigate('publish')"
						class="btn btn-primary"
					>
						Publish
					</button>
					<button @click="navigate('browse')" class="btn btn-ghost">
						Browse
					</button>
				</div>
			</header>

			<!-- HOME -->
			<template x-if="currentPage === 'home'">
				<div class="text-center py-20">
					<h2 class="text-5xl font-bold mb-4">Own your images.</h2>
					<p class="text-lg text-base-content/70">
						Decentralized • No middleman • No censorship
					</p>
					<button
						@click="navigate('publish')"
						class="mt-10 btn btn-primary btn-lg"
					>
						Publish your first work
					</button>
				</div>
			</template>

			<!-- PUBLISH PAGE -->
			<template x-if="currentPage === 'publish'">
				<div class="max-w-xl mx-auto">
					<h2 class="text-3xl font-semibold mb-8">
						Publish New Work
					</h2>

					<div class="space-y-6">
						<div>
							<label class="label"
								><span class="label-text"
									>Title (optional)</span
								></label
							>
							<input
								x-model="newWork.title"
								type="text"
								placeholder="My beautiful artwork"
								class="input input-bordered w-full"
							/>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Tags
									<span class="text-red-500">*</span> (comma
									separated, a-z0-9_ only)</span
								></label
							>
							<input
								x-model="newWork.tags"
								type="text"
								placeholder="landscape, sunset, nature"
								class="input input-bordered w-full"
							/>
						</div>

						<!-- File Upload with Preview -->
						<div>
							<label class="label"
								><span class="label-text"
									>Choose Image
									<span class="text-red-500">*</span></span
								></label
							>
							<input
								type="file"
								accept="image/*"
								@change="handleFileSelect($event)"
								class="file-input file-input-bordered w-full"
							/>

							<div
								x-show="previewUrl"
								class="mt-4 border border-base-300 rounded-xl p-4 bg-base-200"
							>
								<p class="text-sm opacity-70 mb-2">Preview:</p>
								<img
									:src="previewUrl"
									class="max-h-80 mx-auto rounded-lg"
								/>
							</div>
						</div>

						<div class="divider">
							OR manual URL / IPFS CID (fallback)
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Image URL or IPFS CID</span
								></label
							>
							<input
								x-model="newWork.imageRef"
								type="text"
								placeholder="https://... or Qm..."
								class="input input-bordered w-full"
							/>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Author Name (optional)</span
								></label
							>
							<input
								x-model="newWork.author"
								type="text"
								placeholder="Your name or circle"
								class="input input-bordered w-full"
							/>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Author URL (optional)</span
								></label
							>
							<input
								x-model="newWork.authorUrl"
								type="text"
								placeholder="https://twitter.com/yourname"
								class="input input-bordered w-full"
							/>
						</div>

						<button
							@click="publishWork()"
							:disabled="!newWork.tags || (!newWork.imageRef && !previewUrl)"
							class="btn btn-primary w-full py-3 text-lg"
						>
							Publish to the Network
						</button>

						<div
							x-show="status"
							class="alert"
							:class="status.includes('✓') ? 'alert-success' : 'alert-error'"
						>
							<span x-text="status"></span>
						</div>
					</div>
				</div>
			</template>

			<!-- BROWSE -->
			<template x-if="currentPage === 'browse'">
				<div>
					<div class="mb-8">
						<div class="relative max-w-2xl mx-auto">
							<input
								x-model="searchTerm"
								@keyup.enter="performSearch()"
								type="text"
								placeholder="Search by title or tags..."
								class="input input-bordered w-full text-lg py-6 pl-5 pr-20"
							/>
							<button
								@click="performSearch()"
								class="absolute right-2 top-1/2 -translate-y-1/2 btn btn-primary btn-sm px-6"
							>
								Search
							</button>
						</div>
					</div>

					<div class="flex gap-8">
						<div class="w-64 hidden lg:block">
							<h3 class="font-semibold mb-4">Popular tags</h3>
							<div class="space-y-1" x-show="searchTerm">
								<template
									x-for="tag in popularTags"
									:key="tag.name"
								>
									<button
										@click="searchByTag(tag.name)"
										class="w-full text-left px-4 py-2.5 hover:bg-base-200 rounded-lg flex justify-between items-center text-sm"
									>
										<span x-text="tag.name"></span>
										<span
											class="text-xs opacity-60"
											x-text="tag.count"
										></span>
									</button>
								</template>
							</div>
						</div>

						<div class="flex-1">
							<div class="flex justify-between items-center mb-6">
								<h2
									class="text-3xl font-semibold"
									x-text="pageTitle"
								></h2>
								<button
									@click="refreshWorks()"
									class="btn btn-ghost btn-sm"
								>
									Refresh
								</button>
							</div>

							<div
								class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
							>
								<template
									x-for="work in paginatedWorks"
									:key="work.id"
								>
									<div
										@click="viewWork(work)"
										class="work-card card bg-base-200 border border-base-300 overflow-hidden cursor-pointer"
									>
										<div
											class="image-container bg-base-300 flex items-center justify-center overflow-hidden"
										>
											<img
												:src="getImageSrc(work)"
												class="max-h-full max-w-full object-contain"
												onerror="
													this.src =
														'https://placehold.co/600x400/222/aaa?text=Image+Unavailable'
												"
											/>
										</div>
										<div class="p-5">
											<h3
												class="font-medium line-clamp-2 mb-3"
												x-text="work.title || 'Untitled'"
											></h3>
											<div class="flex flex-wrap gap-2">
												<template
													x-for="tag in getTagsArray(work)"
													:key="tag"
												>
													<span
														class="badge badge-sm badge-neutral text-xs truncate max-w-[110px]"
														x-text="tag"
													></span>
												</template>
											</div>
											<div
												class="mt-5 text-xs opacity-60 flex justify-between font-mono"
											>
												<span
													x-text="formatTime(work.timestamp)"
												></span>
												<span
													x-text="work.author || 'anonymous'"
												></span>
											</div>
										</div>
									</div>
								</template>
							</div>
						</div>
					</div>
				</div>
			</template>

			<!-- SINGLE POST VIEW -->
			<template x-if="currentPage === 'view' && selectedWork">
				<div class="max-w-5xl mx-auto">
					<button @click="backToBrowse()" class="btn btn-ghost mb-6">
						← Back
					</button>

					<div class="mb-8 max-w-2xl">
						<div class="relative">
							<input
								x-model="searchTerm"
								@keyup.enter="performSearch()"
								type="text"
								placeholder="Search other works..."
								class="input input-bordered w-full py-6 pl-5 pr-20"
							/>
							<button
								@click="performSearch()"
								class="absolute right-2 top-1/2 -translate-y-1/2 btn btn-primary btn-sm px-6"
							>
								Search
							</button>
						</div>
					</div>

					<div class="bg-base-200 rounded-3xl overflow-hidden">
						<div class="p-8 bg-base-300 flex justify-center">
							<img
								:src="getImageSrc(selectedWork)"
								class="max-h-[80vh] max-w-full object-contain rounded-2xl"
								onerror="
									this.src =
										'https://placehold.co/1200x800/222/aaa?text=Image+Unavailable'
								"
							/>
						</div>

						<div class="p-8">
							<h1
								class="text-4xl font-semibold mb-4"
								x-text="selectedWork.title || 'Untitled'"
							></h1>

							<div class="flex flex-wrap gap-3 mb-8">
								<template
									x-for="tag in getTagsArray(selectedWork)"
									:key="tag"
								>
									<button
										@click="searchByTag(tag)"
										class="badge badge-lg badge-neutral hover:badge-primary"
										x-text="tag"
									></button>
								</template>
							</div>

							<div
								class="grid grid-cols-1 md:grid-cols-3 gap-8 text-sm"
							>
								<div>
									<div class="opacity-60 text-xs mb-1">
										UPLOAD DATE
									</div>
									<div
										x-text="formatTime(selectedWork.timestamp)"
										class="font-medium"
									></div>
								</div>
								<div>
									<div class="opacity-60 text-xs mb-1">
										AUTHOR
									</div>
									<a
										:href="selectedWork.authorUrl || '#'"
										target="_blank"
										class="link link-primary font-medium"
										x-text="selectedWork.author || 'anonymous'"
									></a>
								</div>
								<div>
									<button
										@click="downloadImage()"
										class="btn btn-primary w-full"
									>
										Download Image
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</template>
		</div>

		<script>
			function app() {
				return {
					currentPage: "home",
					gun: null,
					works: [],
					status: "",
					searchTerm: "",
					currentPageNum: 1,
					selectedWork: null,
					previewUrl: null,

					newWork: {
						title: "",
						tags: "",
						imageRef: "",
						author: "",
						authorUrl: "",
					},

					APP_ID: "share-platform-v1",

					init() {
						this.gun = Gun({
							peers: [
								"https://gun-mesh.austinhenderson.com/gun",
								"https://relay.peer.ooo/gun",
							],
							localStorage: true,
							radisk: true,
						});
						this.loadWorks();
						this.handleHashRouting();
					},

					// File → Base64
					handleFileSelect(e) {
						const file = e.target.files[0];
						if (!file) return;

						const reader = new FileReader();
						reader.onload = (ev) => {
							this.previewUrl = ev.target.result;
							this.newWork.imageRef = ev.target.result; // store full base64
						};
						reader.readAsDataURL(file);
					},

					getImageSrc(work) {
						if (!work?.imageRef) return "";
						return work.imageRef; // base64 or external URL
					},

					formatTime(ts) {
						return ts
							? new Date(ts).toLocaleString("ja-JP", {
									month: "short",
									day: "numeric",
									hour: "2-digit",
									minute: "2-digit",
								})
							: "";
					},

					getTagsArray(work) {
						return work?.tags
							? work.tags
									.split(",")
									.map((t) => t.trim())
									.filter(Boolean)
							: [];
					},

					validateTags(tagsStr) {
						if (!tagsStr) return false;
						return tagsStr
							.split(",")
							.map((t) => t.trim())
							.filter(Boolean)
							.every((tag) => /^[a-zA-Z0-9_]+$/.test(tag));
					},

					async publishWork() {
						this.status = "";

						if (!this.newWork.tags) {
							this.status = "Tags are required";
							return;
						}

						if (!this.newWork.imageRef) {
							this.status = "Please select an image file";
							return;
						}

						try {
							const pair = await SEA.pair();
							const sanitized = {
								title: (
									this.newWork.title || "Untitled"
								).trim(),
								tags: this.newWork.tags.trim(),
								imageRef: this.newWork.imageRef, // base64 data URL
								author: (this.newWork.author || "").trim(),
								authorUrl: this.newWork.authorUrl || "",
								timestamp: Date.now(),
								id: "work-" + Date.now(),
							};

							const signature = await SEA.sign(sanitized, pair);

							this.gun
								.get(this.APP_ID)
								.get("works")
								.get(sanitized.id)
								.put({
									...sanitized,
									signature,
									authorPub: pair.pub,
								});

							this.status =
								"✓ Published successfully! Redirecting to your post...";

							setTimeout(() => {
								this.viewWork(sanitized);
								this.newWork = {
									title: "",
									tags: "",
									imageRef: "",
									author: "",
									authorUrl: "",
								};
								this.previewUrl = null;
							}, 800);
						} catch (e) {
							this.status = "Error: " + e.message;
						}
					},

					loadWorks() {
						this.works = [];
						this.gun
							.get(this.APP_ID)
							.get("works")
							.map()
							.on((raw) => {
								if (raw && raw.imageRef && raw.tags) {
									if (
										!this.works.some((w) => w.id === raw.id)
									) {
										this.works.unshift(raw);
									}
								}
							});
					},

					refreshWorks() {
						this.works = [];
						this.loadWorks();
					},

					get filteredWorks() {
						if (!this.searchTerm) return this.works;
						const term = this.searchTerm.toLowerCase();
						return this.works.filter(
							(w) =>
								(w.title &&
									w.title.toLowerCase().includes(term)) ||
								(w.tags && w.tags.toLowerCase().includes(term)),
						);
					},

					get paginatedWorks() {
						const start = (this.currentPageNum - 1) * 12;
						return this.filteredWorks.slice(start, start + 12);
					},

					get totalPages() {
						return Math.max(
							1,
							Math.ceil(this.filteredWorks.length / 12),
						);
					},
					nextPage() {
						if (this.currentPageNum < this.totalPages)
							this.currentPageNum++;
					},
					prevPage() {
						if (this.currentPageNum > 1) this.currentPageNum--;
					},

					get pageTitle() {
						return this.searchTerm
							? `Results for "${this.searchTerm}"`
							: "Latest Works";
					},

					get popularTags() {
						if (!this.searchTerm) return [];
						const countMap = {};
						this.filteredWorks.forEach((w) => {
							this.getTagsArray(w).forEach(
								(tag) =>
									(countMap[tag] = (countMap[tag] || 0) + 1),
							);
						});
						return Object.entries(countMap)
							.map(([name, count]) => ({ name, count }))
							.sort((a, b) => b.count - a.count)
							.slice(0, 12);
					},

					performSearch() {
						this.currentPageNum = 1;
						window.location.hash = `#browse?q=${encodeURIComponent(this.searchTerm)}`;
					},

					searchByTag(tag) {
						this.searchTerm = tag;
						this.performSearch();
					},

					viewWork(work) {
						this.selectedWork = work;
						this.currentPage = "view";
						window.location.hash = `#view:${work.id}`;
					},

					backToBrowse() {
						this.selectedWork = null;
						this.currentPage = "browse";
						window.location.hash = this.searchTerm
							? `#browse?q=${encodeURIComponent(this.searchTerm)}`
							: "#browse";
					},

					downloadImage() {
						if (!this.selectedWork) return;
						const link = document.createElement("a");
						link.href = this.getImageSrc(this.selectedWork);
						link.download =
							(this.selectedWork.title || "image").replace(
								/[^a-z0-9]/gi,
								"_",
							) + ".jpg";
						link.click();
					},

					navigate(page) {
						this.currentPage = page;
						if (page === "browse") this.currentPageNum = 1;
						window.location.hash = "#" + page;
					},

					handleHashRouting() {
						const hash = window.location.hash || "#home";
						if (hash.startsWith("#view:")) {
							const id = hash.slice(6);
							const work = this.works.find((w) => w.id === id);
							if (work) {
								this.selectedWork = work;
								this.currentPage = "view";
							}
						} else if (hash.startsWith("#browse?q=")) {
							this.searchTerm = decodeURIComponent(
								hash.slice(10),
							);
							this.currentPage = "browse";
						} else if (hash === "#browse") {
							this.currentPage = "browse";
						} else {
							this.currentPage = "home";
						}
					},
				};
			}
		</script>
	</body>
</html>
