<!doctype html>
<html lang="ja" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<title>Share</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>

		<script
			src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
			defer
		></script>

		<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>

		<style>
			body {
				font-family: system-ui, sans-serif;
			}
			.work-card {
				transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
			}
			.work-card:hover {
				transform: translateY(-4px);
			}
		</style>
	</head>
	<body class="bg-base-100 text-base-content min-h-screen">
		<div x-data="app()" class="max-w-5xl mx-auto p-6">
			<nav
				class="flex items-center justify-between mb-10 border-b border-base-300 pb-6"
			>
				<div class="flex items-center gap-3">
					<h1 class="text-3xl font-bold tracking-tight">Share</h1>
					<span class="text-xs px-3 py-1 bg-base-300/50 rounded-full"
						>p2p</span
					>
				</div>

				<div class="flex gap-2">
					<button
						@click="currentPage = 'home'"
						:class="{ 'btn btn-primary': currentPage === 'home', 'btn btn-ghost': currentPage !== 'home' }"
					>
						Home
					</button>
					<button
						@click="currentPage = 'publish'"
						:class="{ 'btn btn-primary': currentPage === 'publish', 'btn btn-ghost': currentPage !== 'publish' }"
					>
						Publish
					</button>
					<button
						@click="currentPage = 'browse'"
						:class="{ 'btn btn-primary': currentPage === 'browse', 'btn btn-ghost': currentPage !== 'browse' }"
					>
						Browse
					</button>
				</div>
			</nav>

			<!-- HOME -->
			<template x-if="currentPage === 'home'">
				<div class="text-center py-20">
					<h2 class="text-5xl font-bold mb-4">Own your images.</h2>
					<p class="text-lg text-base-content/70">
						Decentralized • No middleman
					</p>
					<button
						@click="currentPage = 'publish'"
						class="mt-10 btn btn-primary btn-lg"
					>
						Publish a work
					</button>
				</div>
			</template>

			<!-- PUBLISH -->
			<template x-if="currentPage === 'publish'">
				<div class="max-w-xl mx-auto">
					<h2 class="text-3xl font-semibold mb-8">
						Publish New Work
					</h2>

					<div class="space-y-6">
						<div>
							<label class="label"
								><span class="label-text">Title</span></label
							>
							<input
								x-model="newWork.title"
								type="text"
								placeholder="My beautiful artwork"
								class="input input-bordered w-full"
							/>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Tags (comma separated)</span
								></label
							>
							<input
								x-model="newWork.tags"
								type="text"
								placeholder="art, sunset, nature"
								class="input input-bordered w-full"
							/>
						</div>

						<div>
							<label class="label"
								><span class="label-text"
									>Image URL or IPFS CID</span
								></label
							>
							<input
								x-model="newWork.imageRef"
								type="text"
								placeholder="https://... or Qm..."
								class="input input-bordered w-full"
							/>
						</div>

						<button
							@click="publishWork()"
							:disabled="!newWork.title || !newWork.imageRef"
							class="btn btn-primary w-full py-3 text-lg"
						>
							Publish to the Network
						</button>

						<div
							x-show="status"
							:class="status.includes('✓') ? 'alert alert-success' : 'alert alert-info'"
						>
							<span x-text="status"></span>
						</div>
					</div>
				</div>
			</template>

			<!-- BROWSE -->
			<template x-if="currentPage === 'browse'">
				<div>
					<div class="flex justify-between mb-8">
						<h2 class="text-3xl font-semibold">Latest Works</h2>
						<button
							@click="refreshWorks()"
							class="btn btn-sm btn-ghost"
						>
							Refresh
						</button>
					</div>

					<div
						class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
					>
						<template x-for="work in works" :key="work.id">
							<div
								class="work-card card bg-base-200 border border-base-300 overflow-hidden"
							>
								<figure class="aspect-video bg-base-300">
									<img
										:src="getImageSrc(work)"
										class="w-full h-full object-cover"
										onerror="
											this.src =
												'https://picsum.photos/id/237/600/400'
										"
									/>
								</figure>
								<div class="p-5">
									<h3
										class="font-medium line-clamp-2 mb-3"
										x-text="work.title"
									></h3>

									<div class="flex flex-wrap gap-2">
										<span
											x-for="tag in (work.tags ? work.tags.split(' ') : [])"
											:key="tag"
											class="badge badge-sm badge-neutral"
											x-text="tag"
										></span>
									</div>

									<div
										class="mt-6 text-xs opacity-60 flex justify-between font-mono"
									>
										<span
											x-text="formatTime(work.timestamp)"
										></span>
										<span
											x-text="work.authorPub ? work.authorPub.substring(0,10)+'...' : ''"
										></span>
									</div>
								</div>
							</div>
						</template>
					</div>

					<div
						x-show="works.length === 0"
						class="text-center py-20 opacity-50"
					>
						No works yet.<br />Publish something and click Refresh.
					</div>
				</div>
			</template>
		</div>

		<script>
			function app() {
				return {
					currentPage: "home",
					gun: null,
					works: [],
					status: "",

					newWork: { title: "", tags: "", imageRef: "" },

					APP_ID: "share-platform-v1",

					init() {
						this.gun = Gun({
							peers: [
								"https://gun-mesh.austinhenderson.com/gun",
								"https://relay.peer.ooo/gun",
							],
							localStorage: true,
							radisk: true,
						});

						this.loadWorks();
					},

					getImageSrc(work) {
						if (!work?.imageRef) return "";
						return work.imageRef.startsWith("Qm") ||
							work.imageRef.startsWith("bafy")
							? `https://ipfs.io/ipfs/${work.imageRef}`
							: work.imageRef;
					},

					formatTime(ts) {
						return ts
							? new Date(ts).toLocaleString("ja-JP", {
									month: "short",
									day: "numeric",
									hour: "2-digit",
									minute: "2-digit",
								})
							: "";
					},

					async publishWork() {
						if (!this.newWork.title || !this.newWork.imageRef)
							return;

						try {
							const pair = await SEA.pair();
							const tagsStr = this.newWork.tags
								? this.newWork.tags
										.split(",")
										.map((t) => t.trim())
										.filter(Boolean)
										.join(" ")
								: "";

							const metadata = {
								title: this.newWork.title.trim(),
								tags: tagsStr, // ← Fixed: string instead of array
								imageRef: this.newWork.imageRef.trim(),
								authorPub: pair.pub,
								timestamp: Date.now(),
							};

							const signature = await SEA.sign(metadata, pair);
							const workId = "work-" + Date.now();

							this.gun
								.get(this.APP_ID)
								.get("works")
								.get(workId)
								.put({
									...metadata,
									signature,
									id: workId,
								});

							this.status =
								"✓ Published! Go to Browse and click Refresh.";

							this.newWork = {
								title: "",
								tags: "",
								imageRef: "",
							};

							// Auto refresh browse after publish
							setTimeout(() => {
								if (this.currentPage === "browse")
									this.refreshWorks();
							}, 800);
						} catch (e) {
							this.status = "Error publishing: " + e.message;
							console.error(e);
						}
					},

					loadWorks() {
						this.works = [];
						this.gun
							.get(this.APP_ID)
							.get("works")
							.map()
							.on((data) => {
								if (
									data &&
									data.title &&
									!this.works.some((w) => w.id === data.id)
								) {
									this.works.unshift(data);
									if (this.works.length > 30)
										this.works.pop();
								}
							});
					},

					refreshWorks() {
						this.works = [];
						this.loadWorks();
					},
				};
			}
		</script>
	</body>
</html>
