name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # linux/amd64 and linux/arm64 (Wails' GTK3/webkitgtk backend needs cgo, so
  # each builds natively on its own runner — see the Makefile's TARGETS
  # comment), plus windows/amd64 and windows/arm64 cross-compiled from the
  # amd64 leg (no cgo needed there). All packaging (tar.gz + binary renaming
  # + README/licenses) is handled by `make build` itself — see the Makefile.
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: amd64
            runner: ubuntu-latest
            targets: "linux/amd64 windows/amd64 windows/arm64"
          - id: arm64
            runner: ubuntu-24.04-arm
            targets: "linux/arm64"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - run: make build TARGETS="${{ matrix.targets }}"

      - uses: actions/upload-artifact@v4
        with:
          name: charshare-archives-${{ matrix.id }}
          path: dist/charshare_*.tar.gz
          retention-days: 1

  # Not a `go build` at all — a gradle/APK pipeline driven by wails3's
  # Taskfile (see the Makefile's android-apk target). Debug-signed (no
  # release keystore is configured — see build/android/Taskfile.yml's
  # assemble:apk:release comment). Split into its own job since it needs the
  # much heavier `.#android` devShell (Android SDK/NDK/JDK), unlike the
  # desktop matrix above.
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - run: make android-apk

      - uses: actions/upload-artifact@v4
        with:
          name: charshare-apk
          path: dist/charshare.apk
          retention-days: 1

  release:
    needs: [desktop, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          pattern: charshare-archives-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: charshare-apk
          path: dist

      # Regenerates the checksums file across every runner's archives (each
      # `make build` above only covered its own leg) and writes the
      # changelog goreleaser-release-notes style — see the Makefile.
      - run: make checksums changelog

      - uses: softprops/action-gh-release@v2
        with:
          body_path: dist/changelog.txt
          files: |
            dist/charshare_*.tar.gz
            dist/charshare_*_checksums.txt
            dist/charshare.apk
