name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            id: linux
            asset: charshare_linux_x86_64.tar.gz
          - os: ubuntu-24.04-arm
            id: linux
            asset: charshare_linux_arm64.tar.gz
          - os: windows-latest
            id: windows
            asset: charshare_windows_x86_64.zip
          - os: macos-13
            id: darwin
            asset: charshare_darwin_x86_64.tar.gz
          - os: macos-14
            id: darwin
            asset: charshare_darwin_arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Linux GUI deps
        if: matrix.id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install MinGW (Windows cgo)
        if: matrix.id == 'windows'
        uses: egor-tensin/setup-mingw@v2

      - name: Build frontend
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend run build

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: build --single-target --id ${{ matrix.id }} --clean

      - name: Archive (tar.gz)
        if: matrix.id != 'windows'
        shell: bash
        run: |
          bin=$(find dist -type f -name 'charshare*' ! -name '*.tar.gz' ! -name '*.zip')
          tar -C "$(dirname "$bin")" -czf "${{ matrix.asset }}" "$(basename "$bin")"

      - name: Archive (zip)
        if: matrix.id == 'windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path dist -Recurse -Filter "charshare*.exe" | Select-Object -First 1
          Compress-Archive -Path $bin.FullName -DestinationPath "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: charshare_*
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
