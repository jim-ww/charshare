# Config for `wails3 dev`/`wails3 build` — used for local development only.
# Production builds go through goreleaser + Nix instead (see .goreleaser.yaml
# and flake.nix), which never invoke the Wails CLI, so nothing here affects
# what actually ships.
version: '3'

info:
  companyName: "jim-ww"
  productName: "charshare"
  productIdentifier: "com.wails.charshare"
  description: "Decentralized, unmoderated platform to share and talk to AI characters"
  copyright: ""
  comments: ""
  version: "0.0.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - dist
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: go build -tags "desktop gtk3" -o bin/charshare-dev .
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    # wails3's own "is the frontend dev server up yet" check is hardcoded to
    # 10 retries * 500ms = 5s total (pkg/application/application_dev.go) and
    # isn't configurable — svelte-kit sync + a cold Vite start routinely
    # takes longer than that, so the binary launches (below) straight into a
    # fatal "unable to connect to frontend server". Block here until Vite is
    # actually answering, so that 5s budget only has to cover an already-hot
    # server on the primary step's own internal check.
    - cmd: wails3 task common:dev:frontend:wait
      type: blocking
    - cmd: ./bin/charshare-dev
      type: primary
