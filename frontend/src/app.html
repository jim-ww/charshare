<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%" data-theme="dark">
	<head>
		<meta charset="utf-8" />

		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>

		<meta name="text-scale" content="scale" />

		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link
			rel="apple-touch-icon"
			href="%sveltekit.assets%/apple-touch-icon.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="192x192"
			href="%sveltekit.assets%/icon-192.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="512x512"
			href="%sveltekit.assets%/icon-512.png"
		/>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover"><div style="display: contents">%sveltekit.body%</div></body>
</html>
