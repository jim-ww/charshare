# Only used by `wails3 dev` for local hot-reload development (see
# Makefile's `dev` target and build/config.yml). Production builds never
# invoke the Wails CLI — see .goreleaser.yaml's header comment.
version: '3'

vars:
  # Must match what `wails3 dev` itself waits on (its -port flag, default
  # 9245) — plain `pnpm run dev` defaults Vite to 5173 instead, which is why
  # `wails3 dev` sat retrying/timed out against an empty 9245 while Vite was
  # actually listening on 5173.
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  # Consumed by build/android/Taskfile.yml (via its "common:" include of
  # build/Taskfile.yml) for APK/AAB output naming and paths.
  APP_NAME: charshare
  BIN_DIR: bin
  APP_ID: com.wails.charshare

includes:
  android: ./build/android/Taskfile.yml

tasks:
  common:dev:frontend:
    summary: Starts the frontend Vite dev server
    dir: frontend
    cmds:
      # --host 127.0.0.1: without it, Vite binds bare "localhost", which
      # resolves/binds IPv6-only (::1) on this system. Wails' own internal
      # asset proxy hardcodes an IPv4-only ("tcp4") dial to 127.0.0.1 when
      # the dev server URL's host is localhost/127.0.0.1 (see
      # internal/assetserver/build_dev.go — a deliberate Windows IPv6
      # workaround), so an IPv6-only Vite gets "connection refused" from
      # Wails even though curl/browsers hitting "localhost" succeed via ::1.
      - pnpm run dev --port {{.VITE_PORT}} --strictPort --host 127.0.0.1

  common:dev:frontend:wait:
    summary: Blocks until the Vite dev server is actually answering requests
    cmds:
      - |
        for i in $(seq 1 60); do
          if curl -sf -o /dev/null "http://127.0.0.1:{{.VITE_PORT}}"; then
            exit 0
          fi
          sleep 0.5
        done
        echo "Vite dev server never came up on port {{.VITE_PORT}}" >&2
        exit 1

  build:
    summary: Builds the application binary for local dev/testing
    cmds:
      - go build -tags "desktop gtk3" -o bin/charshare .

  run:
    summary: Runs the built application binary
    cmds:
      - ./bin/charshare
